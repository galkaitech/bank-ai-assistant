# ---------------------------------------------------------------------------
# BankMind CI Pipeline
# ---------------------------------------------------------------------------
# Runs on every push and pull request to main and develop branches.
#
# Pipeline stages:
#   1. lint     — Flake8 code style and PEP 8 compliance
#   2. test     — Pytest unit tests with coverage reporting
#   3. docker   — Docker image build validation (does not push)
#
# Note on secrets:
#   The OPENAI_API_KEY is NOT required in CI — the tests are designed
#   to run entirely with mocked LLM calls. Never add real API keys to
#   GitHub Actions secrets for a unit test suite.
# ---------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Linting
  # --------------------------------------------------------------------------
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==7.1.0 flake8-bugbear flake8-docstrings

      - name: Run flake8
        run: |
          # Run flake8 with sensible banking project settings:
          # - max-line-length 100: slightly relaxed from PEP 8's 79 for readability in longer strings
          # - exclude: migrations, __pycache__, virtual environments
          # - extend-ignore E501: allow lines up to max-line-length without error
          flake8 src/ config/ tests/ \
            --max-line-length=100 \
            --extend-ignore=E501,W503,D100,D101,D102,D103,D104,D107 \
            --exclude=.venv,__pycache__,.git,*.egg-info \
            --statistics

  # --------------------------------------------------------------------------
  # Job 2: Unit Tests
  # --------------------------------------------------------------------------
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    # Run in parallel with lint — they are independent
    needs: []

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only the packages needed for testing to keep CI fast.
          # We don't install the full requirements.txt to avoid slow installs
          # of large packages (chromadb, streamlit) that are not needed for tests.
          pip install \
            pytest==8.3.2 \
            pytest-asyncio==0.23.8 \
            pytest-cov==5.0.0 \
            pydantic==2.8.2 \
            pydantic-settings==2.3.4 \
            python-dotenv==1.0.1

      - name: Run tests with coverage
        env:
          # Explicitly no API key — tests must run without one
          OPENAI_API_KEY: ""
          APP_MODE: demo
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=src \
            --cov=config \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
        continue-on-error: true

  # --------------------------------------------------------------------------
  # Job 3: Docker Build Validation
  # --------------------------------------------------------------------------
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: bankmind-api:ci-${{ github.sha }}
          # Enable layer caching to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was built
        run: |
          echo "Docker build completed successfully for commit ${{ github.sha }}"

  # --------------------------------------------------------------------------
  # Job 4: Security Scan (optional — runs on PRs to main only)
  # --------------------------------------------------------------------------
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -f docker/Dockerfile -t bankmind-api:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "bankmind-api:scan"
          format: "table"
          exit-code: "0"          # Don't fail CI on vulnerabilities in prototype
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
